---
- name: "Init: Bootstrap and maintain server state"
  hosts: all
  become: true

  vars_files:
    - "{{ playbook_dir }}/../secrets.yml"

  handlers:
  - name: "Restart SSH (VM)"
    listen: "Restart SSH"
    when: proxmox_type == 'vm'
    ansible.builtin.systemd:
      name: ssh.socket
      state: restarted
      daemon_reload: true

  - name: "Restart SSH (LXC)"
    listen: "Restart SSH"
    when: proxmox_type == 'lxc'
    ansible.builtin.systemd:
      name: ssh.service
      state: restarted
    
  - name: "Restart fail2ban"
    ansible.builtin.systemd:
      name: fail2ban
      state: restarted

  tasks:
    - name: "APT: Update and upgrade all packages"
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        autoremove: true

    - name: "APT: Install required packages"
      ansible.builtin.apt:
        name: 
        - sudo
        - fail2ban
        - unattended-upgrades
        - ufw
        state: present

    - name: "APT: Install essential packages"
      ansible.builtin.apt:
        name: "{{ sys_packages }}"
        state: present

    - name: "System: Set timezone to {{ timezone }}"
      community.general.timezone:
        name: "{{ timezone }}"

    - name: "User: Ensure {{ admin_user }} exists"
      ansible.builtin.user:
        name: "{{ admin_user }}"
        shell: /bin/bash
        groups: sudo
        append: true
      
    - name: "User: Sync SSH keys for {{ admin_user }}"
      ansible.posix.authorized_key:
        user: "{{ admin_user }}"
        state: present
        key: "{{ admin_keys | join('\n') }}\n"

    - name: "User: Passwordless sudo for {{ admin_user }}"
      community.general.sudoers:
        name: "Passwordless sudo for {{ admin_user }}"
        user: "{{ admin_user }}"
        commands: ALL
        nopassword: true

    - name: "SSH (VM): Create socket drop-in directory"
      ansible.builtin.file:
        path: /etc/systemd/system/ssh.socket.d
        state: directory
        mode: '0755'
      when: proxmox_type == 'vm'
        
    - name: "SSH (VM): Set port {{ target_ssh_port }}"
      when: proxmox_type == 'vm'
      notify: "Restart SSH"
      ansible.builtin.copy:
        content: |
          [Socket]
          ListenStream=
          ListenStream={{ target_ssh_port }}
        dest: /etc/systemd/system/ssh.socket.d/override.conf
        mode: '0644'

    - name: "SSH (LXC): Set port {{ target_ssh_port }}"
      when: proxmox_type == 'lxc'
      notify: "Restart SSH"
      ansible.builtin.copy:
        content: "Port {{ target_ssh_port }}\n"
        dest: /etc/ssh/sshd_config.d/99-custom-port.conf
        mode: '0644'

    - name: "SSH: Harden config"
      notify: "Restart SSH"
      ansible.builtin.copy:
        content: |
          PermitRootLogin no
          PasswordAuthentication no
          PubkeyAuthentication yes
        dest: /etc/ssh/sshd_config.d/99-hardening.conf
        mode: '0644'

    - name: "Inventory: Remove ansible_port after SSH port change"
      delegate_to: localhost
      become: false
      ansible.builtin.lineinfile:
        path: "{{ playbook_dir }}/../inventory.ini"
        regexp: '^({{ inventory_hostname }}.*?)\s+ansible_port=\S+(.*)$'
        line: '\1\2'
        backrefs: true

    - name: "SSH: Wait for reconnect on port {{ target_ssh_port }}"
      vars:
        ansible_port: "{{ target_ssh_port }}"
      ansible.builtin.wait_for_connection:
        timeout: 30

    - name: "UFW: Allow {{ target_ssh_port }} for SSH"
      community.general.ufw:
        rule: allow
        port: "{{ target_ssh_port | string }}"
        proto: tcp

    - name: "UFW: Set default policies and enable"
      community.general.ufw:
        state: enabled
        direction: "{{ item.direction }}"
        policy: "{{ item.policy }}"
      loop:
        - { direction: 'incoming', policy: 'deny' }
        - { direction: 'outgoing', policy: 'allow' }

    - name: "F2B: Configure SSH jail"
      notify: "Restart fail2ban"
      ansible.builtin.copy:
        content: |
          [sshd]
          enabled = true
          port = {{ target_ssh_port }}
          maxretry = 3
          bantime = 3600
          findtime = 600
        dest: /etc/fail2ban/jail.d/sshd.conf
        mode: '0644'

    - name: "Unattended-upgrades: Security only"
      ansible.builtin.copy:
        content: |
          Unattended-Upgrade::Allowed-Origins {
            "${distro_id}:${distro_codename}-security";
          };
          Unattended-Upgrade::AutoFixInterruptedDpkg "true";
          Unattended-Upgrade::Remove-Unused-Dependencies "true";
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        mode: '0644'

    - name: "VM: Ensure working qemu-guest-agent"
      when: proxmox_type == 'vm'
      ansible.builtin.systemd:
        name: qemu-guest-agent
        state: started

    - name: "VM: Disable rpcbind"
      when: proxmox_type == 'vm'
      ansible.builtin.systemd:
        name: rpcbind
        state: stopped
        enabled: false
      failed_when: false