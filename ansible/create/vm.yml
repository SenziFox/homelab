---
- name: "VM: Create virtual machine on Proxmox"
  hosts: proxmox
  gather_facts: false
  become: false
  vars_files:
    - "{{ playbook_dir }}/../secrets.yml"
  vars:
    vm_storage: "local"
    vm_template_id: 9000
    vm_template_name: debian-13-template
  vars_prompt:
    - name: vm_id
      prompt: "VM ID"
      private: false
    - name: vm_hostname
      prompt: "Hostname"
      private: false
    - name: vm_disk
      prompt: "Disk size (GB)"
      default: "3"
      private: false
    - name: vm_memory
      prompt: "RAM (MB)"
      default: "2048"
      private: false
    - name: vm_cores
      prompt: "Cores"
      default: "2"
      private: false
  tasks:
    - name: "VM: Compute IP from ID"
      ansible.builtin.set_fact:
        vm_ip: "10.10.{{ (vm_id | int) // 100 }}.{{ (vm_id | int) % 100 }}"

    - name: "VM: Clone template"
      community.proxmox.proxmox_kvm:
        api_host: "{{ pve_host }}"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ pve_api_token_secret }}"
        api_user: "{{ pve_api_user }}"
        autostart: true
        clone: "{{ vm_template_name }}"
        name: "{{ vm_hostname }}"
        newid: "{{ vm_id }}"
        node: "{{ pve_node }}"
        state: present
        storage: "{{ vm_storage }}"
        vmid: "{{ vm_template_id }}"

    - name: "VM: Update VM config"
      community.proxmox.proxmox_kvm:
        api_host: "{{ pve_host }}"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ pve_api_token_secret }}"
        api_user: "{{ pve_api_user }}"
        vmid: "{{ vm_id }}"
        node: "{{ pve_node }}"
        cores: "{{ vm_cores }}"
        memory: "{{ vm_memory }}"
        ipconfig:
          ipconfig0: 'ip={{ vm_ip }}/16,gw={{ default_gateway }}'
        update: true
        state: present

    - name: "VM: Set disk size"
      community.proxmox.proxmox_disk:
        api_host: "{{ pve_host }}"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ pve_api_token_secret }}"
        api_user: "{{ pve_api_user }}"
        disk: scsi0
        size: "{{ vm_disk }}G"
        state: resized
        vmid: "{{ vm_id }}"

    - name: "VM: Start machine"
      community.proxmox.proxmox_kvm:
        api_host: "{{ pve_host }}"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ pve_api_token_secret }}"
        api_user: "{{ pve_api_user }}"
        state: started
        vmid: "{{ vm_id }}"

    - name: "VM: Add host in memory"
      ansible.builtin.add_host:
        name: "{{ vm_hostname }}"
        ansible_host: "{{ vm_ip }}"
        ansible_user: "{{ admin_user }}"
        ansible_port: 22
        proxmox_type: vm
        groups: "new_vm"
        vm_id: "{{ vm_id }}"
        vm_hostname: "{{ vm_hostname }}"

    - name: "VM: Add host to inventory"
      delegate_to: localhost
      become: false
      ansible.builtin.lineinfile:
        insertafter: '^\[new\]'
        line: "{{ vm_hostname }} ansible_host={{ vm_ip }} proxmox_type=vm ansible_port=22"
        path: "{{ playbook_dir }}/../inventories/public.ini"

    - name: "VM: Wait for SSH to become available"
      delegate_to: "{{ vm_hostname }}"
      vars:
        ansible_user: "{{ admin_user }}"
        ansible_port: 22
      ansible.builtin.wait_for_connection:
        delay: 20
        sleep: 5
        timeout: 120

    - name: "Cloud-init: Wait for cloud-init to finish"
      delegate_to: "{{ vm_hostname }}"
      vars:
        ansible_user: "{{ admin_user }}"
        ansible_port: 22
      ansible.builtin.command: cloud-init status --wait
      changed_when: false
      register: cloud_init_result
      failed_when: cloud_init_result.rc not in [0, 2]

    - name: "VM: Done"
      ansible.builtin.debug:
        msg: "VM {{ vm_id }} | {{ vm_hostname }} | {{ vm_ip }} — added to [new] in inventory. Next: ansible-playbook init/init.yml -l {{ vm_hostname }}"
