---
- name: "LXC: Create container on Proxmox"
  hosts: proxmox
  gather_facts: false
  become: false
  vars_files:
    - ../secrets.yml
  vars:
    lxc_ostemplate: "/var/lib/vz/template/cache/debian-13-standard_13.1-2_amd64.tar.zst"
    lxc_storage: "local"
    lxc_cores: 1
    lxc_memory: 512
    lxc_swap: 512
  vars_prompt:
    - name: ct_id
      prompt: "CT ID"
      private: false
    - name: ct_hostname
      prompt: "Hostname"
      private: false
    - name: ct_disk
      prompt: "Disk size (GB)"
      default: "2"
      private: false
  tasks:
    - name: "LXC: Compute IP from ID"
      ansible.builtin.set_fact:
        ct_ip: "10.10.{{ (ct_id | int) // 100 }}.{{ (ct_id | int) % 100 }}"

    - name: "LXC: Check CT {{ ct_id }} does not already exist"
      ansible.builtin.command: pct status {{ ct_id }}
      register: ct_exists
      failed_when: false
      changed_when: false

    - name: "LXC: Abort if CT {{ ct_id }} already exists"
      ansible.builtin.fail:
        msg: "CT {{ ct_id }} already exists. Aborting."
      when: ct_exists.rc == 0

    - name: "LXC: Upload SSH public keys"
      ansible.builtin.copy:
        content: "{{ admin_keys | join('\n') }}\n"
        dest: "/tmp/ansible_pubkeys_{{ ct_id }}.pub"
        mode: '0600'

    - name: "LXC: Create container {{ ct_id }} ({{ ct_hostname }})"
      ansible.builtin.command: >
        sudo pct create {{ ct_id }} {{ lxc_ostemplate }}
        --hostname {{ ct_hostname }}
        --storage {{ lxc_storage }}
        --rootfs {{ lxc_storage }}:{{ ct_disk }}
        --cores {{ lxc_cores }}
        --memory {{ lxc_memory }}
        --swap {{ lxc_swap }}
        --net0 name=eth0,bridge=vmbr0,firewall=1,ip={{ ct_ip }}/24,gw={{ default_gateway }},type=veth
        --unprivileged 1
        --onboot 1
        --features nesting=0
        --ssh-public-keys /tmp/ansible_pubkeys_{{ ct_id }}.pub
        --password {{ admin_password }}
      changed_when: true

    - name: "LXC: Start container {{ ct_id }}"
      ansible.builtin.command: sudo pct start {{ ct_id }}
      changed_when: true

    - name: "LXC: Wait for container to boot"
      ansible.builtin.pause:
        seconds: 10

    - name: "LXC: Setup admin user {{ admin_user }}"
      ansible.builtin.shell: |
        sudo pct exec {{ ct_id }} -- bash << 'ENDOFSCRIPT'
        useradd -m -s /bin/bash {{ admin_user }} || true
        mkdir -p /home/{{ admin_user }}/.ssh
        chmod 700 /home/{{ admin_user }}/.ssh
        apt-get install -y sudo -qq
        echo '{{ admin_user }} ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/{{ admin_user }}
        cat << 'ENDOFKEYS' > /home/{{ admin_user }}/.ssh/authorized_keys
        {{ admin_keys | join('\n') }}
        ENDOFKEYS
        chmod 600 /home/{{ admin_user }}/.ssh/authorized_keys
        chown -R {{ admin_user }}:{{ admin_user }} /home/{{ admin_user }}/.ssh
        ENDOFSCRIPT
      changed_when: true

    - name: "LXC: Remove temp pubkeys file"
      ansible.builtin.file:
        path: "/tmp/ansible_pubkeys_{{ ct_id }}.pub"
        state: absent

    - name: "LXC: Add host to inventory"
      delegate_to: localhost
      become: false
      ansible.builtin.lineinfile:
        path: "../inventory.ini"
        line: "{{ ct_hostname }} ansible_host={{ ct_ip }} proxmox_type=lxc ansible_port=22"
        insertafter: '^\[new\]'

    - name: "LXC: Done"
      ansible.builtin.debug:
        msg: "CT {{ ct_id }} ({{ ct_hostname }}) created and started. Next: ansible-playbook init/init.yml -l {{ ct_hostname }}"