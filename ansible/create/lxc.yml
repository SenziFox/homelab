---
- name: "LXC: Provision container via Proxmox API"
  hosts: proxmox
  gather_facts: false
  become: false
  vars_files:
    - "{{ playbook_dir }}/../secrets.yml"
  vars:
    lxc_ostemplate: "local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst"
    lxc_cores: 1
    lxc_memory: 512
    lxc_swap: 512
    lxc_onboot: true
    lxc_unprivileged: true
  vars_prompt:
    - name: ct_id
      prompt: "CT ID"
      private: false
    - name: ct_hostname
      prompt: "Hostname"
      private: false
    - name: ct_disk
      prompt: "Disk size (GB)"
      default: "2"
      private: false
  tasks:
    - name: "LXC: Compute IP from ID"
      ansible.builtin.set_fact:
        ct_ip: "10.10.{{ (ct_id | int) // 100 }}.{{ (ct_id | int) % 100 }}"

    - name: "LXC: Create container"
      community.proxmox.proxmox:
        api_host: "{{ pve_host }}"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ pve_api_token_secret }}"
        api_user: "{{ pve_api_user }}"
        cores: "{{ lxc_cores }}"
        disk: "local:{{ ct_disk }}"
        hostname: "{{ ct_hostname }}"
        memory: "{{ lxc_memory }}"
        node: "{{ pve_node }}"
        onboot: "{{ lxc_onboot }}"
        vmid: "{{ ct_id }}"
        pubkey: "{{ ansible_key }}"
        swap: "{{ lxc_swap }}"
        ostemplate: "{{ lxc_ostemplate }}"
        unprivileged: "{{ lxc_unprivileged }}"
        netif:
          net0: "name=eth0,gw={{ default_gateway }},ip={{ ct_ip }}/16,bridge=vmbr0,firewall=1"

    - name: "LXC: Start container"
      community.proxmox.proxmox:
        api_host: "{{ pve_host }}"
        api_token_id: "{{ pve_api_token_id }}"
        api_token_secret: "{{ pve_api_token_secret }}"
        api_user: "{{ pve_api_user }}"
        hostname: "{{ ct_hostname }}"
        node: "{{ pve_node }}"
        vmid: "{{ ct_id }}"
        state: started

    - name: "LXC: Wait for start"
      ansible.builtin.pause:
        seconds: 5

    - name: "LXC: Add host in memory"
      ansible.builtin.add_host:
        name: "{{ ct_hostname }}"
        ansible_host: "{{ ct_ip }}"
        ansible_user: root
        ansible_port: 22
        proxmox_type: lxc
        groups: "new_lxc"
        ct_id: "{{ ct_id }}"
        ct_hostname: "{{ ct_hostname }}"

    - name: "LXC: Add host to inventory"
      delegate_to: localhost
      become: false
      ansible.builtin.lineinfile:
        path: "{{ playbook_dir }}/../inventories/public.ini"
        line: "{{ ct_hostname }} ansible_host={{ ct_ip }} proxmox_type=lxc ansible_port=22"
        insertafter: '^\[new\]'

- name: "LXC: Bootstrap admin access"
  hosts: new_lxc
  gather_facts: false
  become: false
  remote_user: root
  vars_files:
    - "{{ playbook_dir }}/../secrets.yml"
  tasks:
    - name: "LXC: Install sudo"
      ansible.builtin.apt:
        name: sudo
        state: present
        update_cache: true

    - name: "LXC: Create admin user"
      ansible.builtin.user:
        name: "{{ admin_user }}"
        shell: /bin/bash
        groups: sudo
        state: present

    - name: "LXC: Deploy ssh keys for admin user"
      ansible.posix.authorized_key:
        user: "{{ admin_user }}"
        state: present
        key: "{{ admin_keys | join('\n') }}\n"

    - name: "LXC: Passwordless sudo for admin user"
      ansible.builtin.copy:
        content: "{{ admin_user }} ALL=(ALL) NOPASSWD:ALL\n"
        dest: "/etc/sudoers.d/{{ admin_user }}"
        mode: '0440'
        validate: 'visudo -cf %s'

    - name: "LXC: Remove root ssh key"
      ansible.builtin.file:
        path: /root/.ssh/authorized_keys
        state: absent

    - name: "LXC: Done"
      ansible.builtin.debug:
        msg: "CT {{ ct_id }} ({{ ct_hostname }}) created and started. Next: ansible-playbook init/init.yml -l {{ ct_hostname }}"
